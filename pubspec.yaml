name: smartagro_connect
description: SmartAgro Connect — production-ready African agricultural marketplace (Flutter).
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ">=3.5.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  cupertino_icons: ^1.0.8
  flutter_riverpod: ^2.6.1
  go_router: ^14.6.2
  dio: ^5.7.0
  sqflite: ^2.4.1
  sqflite_common_ffi: ^2.3.4
  path: ^1.9.0
  shared_preferences: ^2.3.3
  google_fonts: ^6.2.1
  intl: ^0.20.2
  equatable: ^2.0.7
  shimmer: ^3.0.0
  cached_network_image: ^3.4.1
  image_picker: ^1.1.2
  geolocator: ^13.0.2
  google_maps_flutter: ^2.9.0
  flutter_animate: ^4.5.2
  uuid: ^4.5.1
  path_provider: ^2.1.5
  connectivity_plus: ^6.1.0

  # ── Firebase ──────────────────────────────────────────────────────────────
  # Run `flutterfire configure` to generate lib/firebase_options.dart, then
  # add google-services.json (Android) and GoogleService-Info.plist (iOS).
  firebase_core: ^3.6.0
  firebase_auth: ^5.3.1
  cloud_firestore: ^5.4.4
  firebase_messaging: ^15.1.3
  firebase_storage: ^12.3.4
  firebase_crashlytics: ^4.1.0
  firebase_analytics: ^11.3.0
  google_sign_in: ^6.2.1

  # ── Security ──────────────────────────────────────────────────────────────
  # flutter_secure_storage: ^9.2.2
  # Disabled on Windows dev — requires VS ATL component (atlstr.h).
  # Re-enable when building for Android/iOS production:
  #   Visual Studio → Modify → Individual Components → "C++ ATL for v143 build tools"

# ── Networking ───────────────────────────────────────────────────────────
  dio_smart_retry: ^6.0.0

  # ── Image caching ─────────────────────────────────────────────────────────
  flutter_cache_manager: ^3.4.1

  # ── Observability ────────────────────────────────────────────────────────
  logger: ^2.4.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  mocktail: ^1.0.4

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/mock/
